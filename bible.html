<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Holy Bible - Agape Gospel Ministries</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .loading-spinner {
            display: none;
            text-align: center;
            padding: 40px;
            color: var(--primary-gold);
        }

        .chapter-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .chapter-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .chapter-card:hover {
            background: var(--primary-gold);
            color: var(--primary-dark);
        }

        #bible-container {
            min-height: 300px;
        }

        .breadcrumb {
            display: flex;
            gap: 5px;
            font-size: 0.9rem;
            color: var(--primary-gold);
            margin-bottom: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <div class="space"></div>
        <header class="section"
            style="padding-top: 25px; display: flex; align-items: center; justify-content: space-between;">
            <a href="index.html" style="color: white; font-size: 1.35rem; padding-left: 10px;">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div style="text-align: center; flex: 1; margin-right: 30px;">
                <img src="assets/Agape.png" alt="Agape Gospel Ministries" style="height: 100px; object-fit: contain;">
                <h1 class="serif" style="color: var(--primary-gold); font-size: 1.4rem; margin-top: -10px;">Holy Bible
                </h1>
            </div>
        </header>

        <!-- Language Selection -->
        <div id="language-selection" class="section animate-in" style="text-align: center; padding-top: 50px;">
            <p style="color: var(--text-muted); margin-bottom: 30px;">Choose your preferred language</p>
            <div style="display: flex; flex-direction: column; gap: 20px; align-items: center;">
                <div class="glass" onclick="selectLanguage('telugu')"
                    style="width: 100%; max-width: 300px; padding: 25px; border-radius: 20px; cursor: pointer; border: 1px solid var(--primary-gold);">
                    <h2 class="serif" style="color: var(--primary-gold); margin-bottom: 5px;">తెలుగు బైబిల్</h2>
                    <p style="font-size: 0.8rem; opacity: 0.7;">Telugu Bible</p>
                </div>
                <div class="glass" onclick="selectLanguage('english')"
                    style="width: 100%; max-width: 300px; padding: 25px; border-radius: 20px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);">
                    <h2 class="serif" style="color: white; margin-bottom: 5px;">English Bible</h2>
                    <p style="font-size: 0.8rem; opacity: 0.7;">Holy Bible</p>
                </div>
            </div>
        </div>

        <!-- Dynamic Bible Search & Content -->
        <section id="bible-content" class="section" style="display: none;">
            <div id="bible-navigation" class="breadcrumb"
                style="display: none; align-items: center; gap: 10px; padding: 10px 5px; font-weight: 500;">
                <i class="fa-solid fa-house-chimney" onclick="resetToLanguage()"
                    style="font-size: 0.9rem; color: var(--primary-gold); cursor: pointer;"></i>
                <span onclick="showTestamentChoice()" style="cursor: pointer; opacity: 0.7;">Holy Bible</span>
                <span id="breadcrumb-testament"
                    style="display: none; cursor: pointer; color: var(--primary-gold);"></span>
                <span id="breadcrumb-book" style="display: none; cursor: pointer; color: var(--primary-gold);"></span>
            </div>

            <div id="testament-choice" style="display: none; text-align: center; padding-top: 20px;">
                <h2 id="bible-title-display" class="serif"
                    style="color: var(--primary-gold); margin-bottom: 30px; font-size: 1.8rem;">Holy Bible</h2>
                <div style="display: flex; flex-direction: column; gap: 20px; align-items: center;">
                    <div class="glass testament-big-card" onclick="filterBooks('OT')"
                        style="width: 100%; max-width: 330px; padding: 30px; border-radius: 20px; cursor: pointer; border: 1px solid rgba(255,255,255,0.08);">
                        <i class="fa-solid fa-book-open"
                            style="font-size: 2.2rem; color: var(--primary-gold); margin-bottom: 15px;"></i>
                        <h3 id="ot-label" style="font-weight: 600; font-size: 1.4rem; color: white;">Old Testament</h3>
                        <p id="ot-sublabel" style="font-size: 0.8rem; opacity: 0.6; margin-top: 5px;">39 Sacred Books
                        </p>
                    </div>
                    <div class="glass testament-big-card" onclick="filterBooks('NT')"
                        style="width: 100%; max-width: 330px; padding: 30px; border-radius: 20px; cursor: pointer; border: 1px solid rgba(255,255,255,0.08);">
                        <i class="fa-solid fa-scroll"
                            style="font-size: 2.2rem; color: var(--primary-gold); margin-bottom: 15px;"></i>
                        <h3 id="nt-label" style="font-weight: 600; font-size: 1.4rem; color: white;">New Testament</h3>
                        <p id="nt-sublabel" style="font-size: 0.8rem; opacity: 0.6; margin-top: 5px;">27 Sacred Books
                        </p>
                    </div>
                </div>
            </div>

            <div id="bible-main-container" style="display: none;">
                <div id="book-list" class="book-grid">
                    <!-- Books will be injected here -->
                </div>

                <div id="chapter-list" style="display: none;">
                    <h2 id="selected-book-title" class="serif" style="color: var(--primary-gold); margin-bottom: 20px;">
                    </h2>
                    <div class="chapter-grid" id="chapters-container">
                        <!-- Chapters will be injected here -->
                    </div>
                </div>

                <div id="verse-list" style="display: none;">
                    <div class="glass" style="padding: 20px; border-radius: 20px;">
                        <h2 id="reading-title" class="serif"
                            style="color: var(--primary-gold); margin-bottom: 15px; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px;">
                        </h2>
                        <div id="verses-content" class="verse-view">
                            <!-- Verses will be injected here -->
                        </div>
                        <div
                            style="display: flex; justify-content: space-between; margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                            <button id="prevChapter" class="icon-btn" style="color: white;"><i
                                    class="fa-solid fa-chevron-left"></i> Previous</button>
                            <button id="nextChapter" class="icon-btn" style="color: white;">Next <i
                                    class="fa-solid fa-chevron-right"></i></button>
                        </div>
                    </div>
                </div>

                <div id="loader" class="loading-spinner">
                    <i class="fas fa-circle-notch fa-spin fa-2x"></i>
                    <p style="margin-top: 10px;">Heavenly words loading...</p>
                </div>
            </div>
        </section>
    </div>

    <nav class="glass bottom-nav">
        <a href="songs.html" class="nav-item">
            <i class="fa-solid fa-music"></i>
            <span>Songs</span>
        </a>
        <a href="events.html" class="nav-item">
            <i class="fa-solid fa-calendar-days"></i>
            <span>Events</span>
        </a>
        <a href="index.html" class="nav-item home-item">
            <div class="home-circle">
                <i class="fa-solid fa-house" style="font-size: 1.5rem;"></i>
            </div>
            <span></span>
        </a>
        <a href="bible.html" class="nav-item active">
            <i class="fa-solid fa-bible"></i>

        </a>
        <a href="prayer.html" class="nav-item">
            <i class="fa-solid fa-heart-pulse"></i>
            <span>Prayer</span>
        </a>
    </nav>

        function selectLanguage(lang) {
            selectedLanguage = lang;
            document.getElementById('language-selection').style.display = 'none';
            document.getElementById('bible-content').style.display = 'block';
            showTestamentChoice();
        }

        function showTestamentChoice() {
            const data = bibleData[selectedLanguage];
            document.getElementById('bible-title-display').innerText = data.title;
            document.getElementById('ot-label').innerText = data.ot_label;
            document.getElementById('nt-label').innerText = data.nt_label;
            document.getElementById('ot-sublabel').innerText = data.books_sub;
            document.getElementById('nt-sublabel').innerText = data.NT_sub;

            document.getElementById('testament-choice').style.display = 'block';
            document.getElementById('bible-main-container').style.display = 'none';
            document.getElementById('bible-navigation').style.display = 'none';
        }

        function resetToLanguage() {
            document.getElementById('language-selection').style.display = 'block';
            document.getElementById('bible-content').style.display = 'none';
        }

        function filterBooks(testament) {
            currentTestament = testament.toUpperCase();
            const books = bibleData[selectedLanguage][currentTestament];
            const list = document.getElementById('book-list');
            list.innerHTML = '';

            books.forEach(book => {
                const card = document.createElement('div');
                card.className = 'book-card';
                card.innerText = book.name;
                card.onclick = () => loadChapters(book);
                list.appendChild(card);
            });

            document.getElementById('testament-choice').style.display = 'none';
            document.getElementById('bible-main-container').style.display = 'block';
            document.getElementById('book-list').style.display = 'grid';
            document.getElementById('chapter-list').style.display = 'none';
            document.getElementById('verse-list').style.display = 'none';

            document.getElementById('bible-navigation').style.display = 'flex';
            const testLabel = bibleData[selectedLanguage][currentTestament.toLowerCase() + '_label'] || currentTestament;
            document.getElementById('breadcrumb-testament').style.display = 'inline';
            document.getElementById('breadcrumb-testament').innerText = ' > ' + testLabel;
            document.getElementById('breadcrumb-testament').onclick = () => filterBooks(currentTestament);
            document.getElementById('breadcrumb-book').style.display = 'none';
        }

        function loadChapters(book) {
            currentBookData = book;
            document.getElementById('book-list').style.display = 'none';
            document.getElementById('chapter-list').style.display = 'block';
            document.getElementById('selected-book-title').innerText = book.name;

            const container = document.getElementById('chapters-container');
            container.innerHTML = '';

            for (let i = 1; i <= book.chapters; i++) {
                const card = document.createElement('div');
                card.className = 'chapter-card';
                card.innerText = i;
                card.onclick = () => loadVerses(i);
                container.appendChild(card);
            }

            document.getElementById('breadcrumb-book').style.display = 'inline';
            document.getElementById('breadcrumb-book').innerText = ' > ' + book.name;
            document.getElementById('breadcrumb-book').onclick = () => loadChapters(book);
        }

        async function loadVerses(chapterNum) {
            currentChapterNum = chapterNum;
            document.getElementById('chapter-list').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            const content = document.getElementById('verses-content');
            content.innerHTML = '';

            // Update Navigation Buttons
            document.getElementById('prevChapter').onclick = () => navigateChapter(-1);
            document.getElementById('nextChapter').onclick = () => navigateChapter(1);
            document.getElementById('prevChapter').style.visibility = currentChapterNum > 1 ? 'visible' : 'hidden';
            document.getElementById('nextChapter').style.visibility = currentChapterNum < currentBookData.chapters ? 'visible' : 'hidden';

            try {
                let url = '';
                if (selectedLanguage === 'english') {
                    url = `https://bible-api.com/${currentBookData.name}+${chapterNum}`;
                    const response = await fetch(url);
                    const data = await response.json();

                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('verse-list').style.display = 'block';
                    document.getElementById('reading-title').innerText = `${currentBookData.name} ${chapterNum}`;

                    content.innerHTML = data.verses.map(v =>
                        `<p><span class="verse-num">${v.verse}</span> ${v.text}</p>`
                    ).join('');
                } else {
                    // Fetch Telugu verses from aruljohn's GitHub repo
                    const bookId = currentBookData.id || currentBookData.name;
                    url = `https://raw.githubusercontent.com/aruljohn/Bible-telugu/main/${encodeURIComponent(bookId)}.json`;

                    const response = await fetch(url);
                    const json = await response.json();

                    const chapter = json.chapters.find(c => c.chapter == chapterNum);

                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('verse-list').style.display = 'block';
                    document.getElementById('reading-title').innerText = `${currentBookData.name} ${chapterNum}`;

                    if (chapter && chapter.verses) {
                        content.innerHTML = chapter.verses.map(v =>
                            `<p><span class="verse-num">${v.verse}</span> ${v.text}</p>`
                        ).join('');
                    } else {
                        content.innerHTML = `<p style="text-align:center; opacity:0.7;">Chapter not found in this translation.</p>`;
                    }
                }

                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (error) {
                console.error(error);
                showStatus('Verse connection error. Try again.', 'error');
                document.getElementById('loader').style.display = 'none';
                document.getElementById('chapter-list').style.display = 'block';
            }
        }

        function navigateChapter(direction) {
            const next = currentChapterNum + direction;
            if (next >= 1 && next <= currentBookData.chapters) {
                loadVerses(next);
            }
        }

    </script>
</body>

</html>
