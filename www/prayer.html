<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prayer Wall - Agape Gospel Ministries</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <div class="space"></div>
        <!-- Header -->
        <header class="section" style="padding-top: 40px; text-align: center;">
            <i class="fa-solid fa-hands-praying"
                style="color: var(--primary-gold); font-size: 2.5rem; margin-bottom: 15px;"></i>
            <h1 class="serif" style="color: var(--primary-gold); font-size: 2.22rem; line-height: 1.1;">Prayer Wall</h1>
            <p style="color: var(--text-muted); margin-top: 5px;">Share your requests and pray for one another</p>
            <div class="badge" id="prayerCount"
                style="margin-top: 15px; background: rgba(212, 175, 55, 0.2); color: var(--primary-gold);">... Active
            </div>
        </header>

        <!-- Submit Prayer -->
        <section class="section animate-in">
            <div class="glass" style="padding: 25px; border-radius: 25px;">
                <h3 class="serif" style="margin-bottom: 15px;">Request Prayer</h3>
                <form id="prayerForm" onsubmit="submitPrayer(event)">
                    <div class="form-group">
                        <input type="text" id="userName" placeholder="Your Name" class="input-field" required
                            style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white;">
                    </div>
                    <div class="form-group">
                        <textarea id="prayerRequest" placeholder="How can we pray for you?" rows="3" required
                            style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white;"></textarea>
                    </div>
                    <button type="submit" class="btn" style="width: 100%; margin-top: 15px;">Share with
                        Community</button>
                </form>
            </div>
        </section>

        <!-- Prayer List -->
        <section class="section">
            <div class="section-title">
                <h2>Community Prayers</h2>
            </div>
            <div id="prayerContainer">
                <!-- Prayers will be loaded here -->
                <div class="glass" style="padding: 40px; text-align: center; color: var(--text-muted);">
                    <i class="fa-solid fa-spinner fa-spin" style="font-size: 1.5rem; margin-bottom: 10px;"></i>
                    <p>Loading the wall...</p>
                </div>
            </div>
        </section>

        <!-- Bottom Navigation -->
        <nav class="glass bottom-nav">
            <a href="songs.html" class="nav-item">
                <i class="fa-solid fa-music"></i>
                <span>Songs</span>
            </a>
            <a href="events.html" class="nav-item">
                <i class="fa-solid fa-calendar-days"></i>
                <span>Events</span>
            </a>
            <a href="index.html" class="nav-item home-item">
                <div class="home-circle">
                    <i class="fa-solid fa-house" style="font-size: 1.5rem;"></i>
                </div>
                <span></span>
            </a>
            <a href="bible.html" class="nav-item">
                <i class="fa-solid fa-bible"></i>
                <span>Bible</span>
            </a>
            <a href="prayer.html" class="nav-item active">
                <i class="fa-solid fa-heart-pulse"></i>
                <span>Prayer</span>
            </a>
        </nav>
    </div>

    <script>
        function timeAgo(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffInSeconds = Math.floor((now - date) / 1000);
            if (diffInSeconds < 60) return "Just now";
            const minutes = Math.floor(diffInSeconds / 60);
            if (minutes < 60) return minutes + " minutes ago";
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return hours + " hours ago";
            const days = Math.floor(hours / 24);
            return days + " days ago";
        }

        async function loadPrayers() {
            try {
                const response = await fetch('https://project-agm.onrender.com/api/prayers');
                const prayers = await response.json();
                const container = document.getElementById('prayerContainer');
                document.getElementById('prayerCount').innerText = `${prayers.length} Active`;
                container.innerHTML = '';

                prayers.forEach((prayer) => {
                    const isOwner = localStorage.getItem(`my_prayer_${prayer.id}`);
                    container.innerHTML += `
                        <div class="glass prayer-card animate-in" style="margin-bottom: 15px; padding: 20px; border-radius: 20px; position:relative;">
                            <div class="prayer-meta" style="display: flex; justify-content: space-between; font-size: 0.8rem; opacity: 0.6; margin-bottom: 10px;">
                                <span>${prayer.user_name}</span>
                                <span>${timeAgo(prayer.created_at)}</span>
                            </div>
                            <div class="prayer-text" style="font-size: 1rem; line-height: 1.4;">"${prayer.request}"</div>
                            ${isOwner ? `
                                <div style="display:flex; gap: 10px; margin-top: 15px;">
                                    <button onclick="editPrayer(${prayer.id}, '${prayer.request.replace(/'/g, "\\'")}')" class="btn" style="padding: 5px 12px; font-size: 0.7rem; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);"><i class="fa-solid fa-pen"></i> Edit</button>
                                    <button onclick="deletePrayer(${prayer.id})" class="btn" style="padding: 5px 12px; font-size: 0.7rem; background: rgba(255, 71, 87, 0.1); border: 1px solid rgba(255, 71, 87, 0.2); color: #ff4757;"><i class="fa-solid fa-trash"></i> Delete</button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Load failed", error);
            }
        }

        async function submitPrayer(e) {
            e.preventDefault();
            const name = document.getElementById('userName').value || 'Anonymous';
            const request = document.getElementById('prayerRequest').value;
            if (!request) return;

            const res = await fetch('https://project-agm.onrender.com/api/prayers', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userName: name, request })
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem(`my_prayer_${data.id}`, 'true');
                document.getElementById('prayerRequest').value = '';
                document.getElementById('userName').value = '';
                showStatus('Prayer Request Sent!', 'success');
                loadPrayers();
            } else {
                showStatus('Submission failed', 'error');
            }
        }

        async function deletePrayer(id) {
            const ok = await askUser('Delete Prayer', 'Remove your prayer request?');
            if (!ok) return;
            await fetch(`https://project-agm.onrender.com/api/prayers/${id}`, { method: 'DELETE' });
            localStorage.removeItem(`my_prayer_${id}`);
            showStatus('Prayer deleted', 'info');
            loadPrayers();
        }

        async function editPrayer(id, currentText) {
            const newText = prompt('Update your prayer:', currentText);
            if (!newText || newText === currentText) return;
            await fetch(`https://project-agm.onrender.com/api/prayers/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ request: newText })
            });
            loadPrayers();
        }

        loadPrayers();
    </script>
    <script src="app.js"></script>
</body>

</html>
