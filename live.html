<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Service - Agape Gospel Ministries</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <div class="space"></div>
        <!-- Header -->
        <header class="section"
            style="padding-top: 35px; display: flex; align-items: center; justify-content: space-between;">
            <a href="index.html" style="color: white; font-size: 1.35rem; padding-left: 10px;">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div style="text-align: center; flex: 1; margin-right: 30px;">
                <img src="assets/Agape.png" alt="Agape Gospel Ministries" style="height: 100px; object-fit: contain;">
            </div>
        </header>

        <!-- Live Content -->
        <section class="section animate-in" style="text-align: center; padding-top: 30px;">

            <p
                style="color: #ff4757; font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <span
                    style="width: 8px; height: 8px; background: #ff4757; border-radius: 50%; display: inline-block;"></span>
                LIVE SERVICE
                <span
                    style="width: 8px; height: 8px; background: #ff4757; border-radius: 50%; display: inline-block;"></span>
            </p>

            <div class="glass" style="margin-top: 30px; border-radius: 25px; overflow: hidden; aspect-ratio: 16/9;">
                <iframe id="live_iframe" width="100%" height="100%" src="" frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>

            <div style="margin-top: 40px;">
                <a id="watch_on_youtube_btn" href="https://youtube.com/@agapegospelministries2003" target="_blank"
                    class="btn"
                    style="text-decoration: none; display: inline-flex; align-items: center; gap: 10px; width: auto; background: #FF0000; color: white;">
                    <i class="fa-brands fa-youtube"></i> Watch on YouTube Live
                </a>
            </div>

            <div style="margin-top: 30px; padding: 0 20px;">
                <img src="assets/images.jpeg" alt="Service Image"
                    style="width: 100%; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); object-fit: cover;">
            </div>
        </section>

        <script>
            function getYouTubeId(url) {
                if (!url) return null;
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|live\/)([^#\&\?]*).*/;
                const match = url.match(regExp);
                return (match && match[2].length === 11) ? match[2] : null;
            }

            document.addEventListener('DOMContentLoaded', async () => {
                try {
                    const res = await fetch('https://project-agm.onrender.com/api/settings');
                    const s = await res.json();

                    if (s.live_video_url) {
                        const videoId = getYouTubeId(s.live_video_url);
                        if (videoId) {
                            document.getElementById('live_iframe').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
                        } else {
                            document.getElementById('live_iframe').src = s.live_video_url; // fallback
                        }
                        document.getElementById('watch_on_youtube_btn').href = s.live_video_url;
                    }
                } catch (e) {
                    console.error('Failed to load live settings:', e);
                }
            });
        </script>

        <!-- Bottom Navigation -->
        <nav class="glass bottom-nav">
            <a href="songs.html" class="nav-item">
                <i class="fa-solid fa-music"></i>
                <span>Songs</span>
            </a>
            <a href="events.html" class="nav-item">
                <i class="fa-solid fa-calendar-days"></i>
                <span>Events</span>
            </a>
            <a href="index.html" class="nav-item home-item">
                <div class="home-circle">
                    <i class="fa-solid fa-house" style="font-size: 1.5rem;"></i>
                </div>
                <span></span>
            </a>
            <a href="bible.html" class="nav-item">
                <i class="fa-solid fa-bible"></i>
                <span>Bible</span>
            </a>
            <a href="contact.html" class="nav-item">
                <i class="fa-solid fa-envelope-open-text"></i>
                <span>Contact</span>
            </a>
        </nav>
    </div>

    <script src="app.js"></script>
</body>

</html>
