<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Service - Agape Gospel Ministries</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <!-- Modern Header based on Reference -->
        <header class="section" style="padding-top: 40px; display: flex; align-items: center;">
            <a href="index.html" style="color: var(--text-light); font-size: 1.5rem; text-decoration: none;">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h1 class="serif" style="flex: 1; text-align: center; font-size: 1.6rem; color: var(--text-light);">Live
            </h1>
            <div style="width: 24px;"></div> <!-- Spacer for balance -->
        </header>

        <!-- Live Content Section -->
        <section class="section animate-in" style="text-align: center; padding-top: 40px;">
            <h2 class="serif" style="font-size: 1.4rem; color: var(--text-light); letter-spacing: 1px; opacity: 0.9;">
                AGAPE GOSPEL MINISTRIES
            </h2>

            <div class="live-status">
                <i class="fa-solid fa-circle" style="font-size: 0.8rem;"></i>
                LIVE SERVICE
                <i class="fa-solid fa-circle" style="font-size: 0.8rem;"></i>
            </div>

            <!-- YouTube Video Embed -->
            <div class="video-container animate-in" style="animation-delay: 0.2s;">
                <iframe src="https://www.youtube.com/embed/HOuTe90NEeQ?autoplay=1"
                    title="Live Service - Agape Gospel Ministries"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>

            <div style="margin-top: 40px;">
                <a href="https://youtube.com/@agapegospelministries2003?si=8IHO6zC2QKy3QpI7" target="_blank" class="btn"
                    style="text-decoration: none; display: inline-flex; align-items: center; gap: 10px; width: auto;">
                    <i class="fa-brands fa-youtube"></i> Watch on YouTube
                </a>
            </div>
        </section>

        <!-- Bottom Navigation -->
        <nav class="glass bottom-nav">
            <a href="sermons.html" class="nav-item">
                <i class="fa-solid fa-book-open"></i>
                <span>Sermons</span>
            </a>
            <a href="events.html" class="nav-item">
                <i class="fa-solid fa-calendar-days"></i>
                <span>Events</span>
            </a>
            <a href="index.html" class="nav-item home-item">
                <div class="home-circle">
                    <i class="fa-solid fa-house" style="font-size: 1.5rem;"></i>
                </div>
                <span>Home</span>
            </a>
            <a href="bible.html" class="nav-item">
                <i class="fa-solid fa-bible"></i>
                <span>Bible</span>
            </a>
            <a href="prayer.html" class="nav-item">
                <i class="fa-solid fa-heart-pulse"></i>
                <span>Prayer</span>
            </a>
        </nav>
    </div>

    <script src="app.js"></script>
</body>

</html>
