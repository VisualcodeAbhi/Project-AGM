<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Upcoming Events - Agape Gospel Ministries</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <!-- Modern App Header -->
        <header class="section"
            style="padding: 20px 25px 0; display: flex; justify-content: space-between; align-items: center;">
            <i class="fa-solid fa-cross" style="color: var(--primary-gold); font-size: 1.2rem;"></i>
            <div style="text-align: center;">
                <i class="fa-solid fa-church"
                    style="color: var(--primary-gold); font-size: 1.5rem; display: block; margin-bottom: 2px;"></i>
                <span class="serif app-title-dynamic"
                    style="font-size: 0.9rem; color: chocolate; font-weight: 700; letter-spacing: 0.5px;">AGAPE
                    GOSPEL MINISTRIES</span>
            </div>
            <div style="display: flex; gap: 15px;">
            </div>
        </header>

        <!-- Page Title -->
        <section class="section"
            style="padding-bottom: 5px; display: flex; justify-content: space-between; align-items: center;">
            <h2 class="serif center" style="font-size: 1.8rem;">Upcoming Events</h2>
        </section>

        <!-- Events List -->
        <section class="section animate-in" id="eventsContainer">
            <!-- Loading State -->
            <div class="glass" style="padding: 40px; text-align: center; color: var(--text-muted);">
                <i class="fa-solid fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 10px;"></i>
                <p>Loading upcoming events...</p>
            </div>
        </section>

        <script>
            document.addEventListener('DOMContentLoaded', loadPublicEvents);

            async function loadPublicEvents() {
                try {
                    const res = await fetch('https://agm-khbc.onrender.com/api/settings');
                    const s = await res.json();
                    document.querySelectorAll('.app-title-dynamic').forEach(el => el.innerText = s.church_name);

                    const eventRes = await fetch('https://agm-khbc.onrender.com/api/events');
                    const events = await eventRes.json();
                    const container = document.getElementById('eventsContainer');
                    const isAdmin = localStorage.getItem('isAdmin') === 'true';

                    if (isAdmin) {
                        const addBtn = document.createElement('div');
                        addBtn.className = 'admin-add-btn';
                        addBtn.style.margin = '20px 0 30px 0';
                        addBtn.innerHTML = '<i class="fa-solid fa-plus"></i> Add New Event';
                        addBtn.onclick = () => window.location.href = 'admin.html#events';
                        container.parentNode.insertBefore(addBtn, container);
                    }

                    if (events.length === 0) {
                        container.innerHTML = `
                            <div class="glass" style="padding: 40px; text-align: center; color: var(--text-muted);">
                                <p>No upcoming events currently scheduled. Check back soon!</p>
                            </div>
                        `;
                        return;
                    }

                    container.innerHTML = '';
                    events.forEach(event => {
                        // Better date parsing for badge
                        let displayDay = event.date.split(' ')[0];
                        let displayMonth = event.date.split(' ')[1] || '';

                        if (event.date.includes('-')) { // YYYY-MM-DD format
                            const d = new Date(event.date);
                            displayDay = d.getDate();
                            displayMonth = d.toLocaleString('default', { month: 'short' });
                        }

                        container.innerHTML += `
                            <div class="glass event-card animate-in" style="margin-bottom: 20px; position: relative;">
                                ${isAdmin ? `<div class="admin-edit-btn" onclick="deleteEventNow(${event.id})" style="top: 10px; right: 10px;"><i class="fa-solid fa-trash" style="font-size: 0.8rem;"></i></div>` : ''}
                                <div class="event-date-badge">
                                    <span class="day">${displayDay}</span>
                                    <span class="month">${displayMonth}</span>
                                </div>
                                <div class="event-details" style="padding: 20px;">
                                    <h3 class="serif">${event.title}</h3>
                                    <p style="font-size: 0.85rem; color: var(--text-muted);"><i class="fa-solid fa-clock"></i> ${event.time}</p>
                                    <p style="font-size: 0.85rem; color: var(--text-muted);"><i class="fa-solid fa-location-dot"></i> ${event.location}</p>
                                    <button onclick="handleJoinEvent('${event.date}', '${event.time}')" class="join-btn" style="border:none; cursor:pointer; width: 100%;">
                                        <i class="fa-solid fa-play"></i> Join Service
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                } catch (error) {
                    console.error('Failed to load events:', error);
                }
            }

            function handleJoinEvent(dateStr, timeStr) {
                try {
                    // Normalize date and time for comparison
                    let eventDate;
                    if (dateStr.includes('-')) {
                        eventDate = new Date(dateStr + 'T' + (timeStr.includes(':') ? timeStr : '00:00'));
                    } else {
                        // Fallback for legacy text dates - assume current year
                        const currentYear = new Date().getFullYear();
                        eventDate = new Date(`${dateStr} ${currentYear} ${timeStr}`);
                    }

                    const now = new Date();

                    // Allow joining 15 minutes early
                    const bufferTime = 15 * 60 * 1000;
                    if (now >= (eventDate.getTime() - bufferTime)) {
                        window.location.href = 'live.html';
                    } else {
                        const timeDiff = eventDate - now;
                        const hours = Math.floor(timeDiff / (1000 * 60 * 60));
                        const mins = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));

                        let message = "This service hasn't started yet.";
                        if (hours > 0) message += ` Starts in ${hours}h ${mins}m.`;
                        else message += ` Starts in ${mins} minutes.`;

                        alert(message + "\nScheduled: " + timeStr);
                    }
                } catch (e) {
                    // If parsing fails, just redirect (better than doing nothing)
                    window.location.href = 'live.html';
                }
            }

            async function deleteEventNow(id) {
                if (!confirm('Delete this event?')) return;
                await fetch(`http://localhost:3000/api/events/${id}`, { method: 'DELETE' });
                window.location.reload();
            }
        </script>

        <!-- Bottom Navigation -->
        <nav class="glass bottom-nav">
            <a href="songs.html" class="nav-item">
                <i class="fa-solid fa-music"></i>
                <span>Songs</span>
            </a>
            <a href="events.html" class="nav-item active">
                <i class="fa-solid fa-calendar-days"></i>
                <span>Events</span>
            </a>
            <a href="index.html" class="nav-item home-item">
                <div class="home-circle">
                    <i class="fa-solid fa-house" style="font-size: 1.5rem;"></i>
                </div>
                <span></span>
            </a>
            <a href="bible.html" class="nav-item">
                <i class="fa-solid fa-bible"></i>
                <span>Bible</span>
            </a>
            <a href="prayer.html" class="nav-item">
                <i class="fa-solid fa-heart-pulse"></i>
                <span>Prayer</span>
            </a>
        </nav>
    </div>

    <script src="app.js"></script>
</body>

</html>
